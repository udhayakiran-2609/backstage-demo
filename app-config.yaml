app:
  title: Scaffolded Backstage App
  baseUrl: http://localhost:3000
  packages: all

organization:
  name: My Company

backend:
  baseUrl: http://localhost:${PORT}
  listen:
    port: ${PORT}
    host: 0.0.0.0
  database:
    client: better-sqlite3
    connection: ':memory:'
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  reading:
    allow:
      - host: github.com
      - host: raw.githubusercontent.com
      - host: api.github.com
      - host: bitbucket.org
      - host: api.bitbucket.org

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}
  bitbucketCloud:
    - username: ${BITBUCKET_USERNAME}
      token: ${BITBUCKET_TOKEN}

auth:
  environment: development
  providers:
    guest: {}

techdocs:
  builder: local
  generator:
    runIn: local
  publisher:
    type: local

scaffolder:
  defaultAuthor:
    name: Backstage
    email: backstage@elitecorpusa.com

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location, Group, User, Template]
  locations:
    - type: url
      target: https://bitbucket.org/calixprod/backstage-catalog/src/main/catalog-info.yaml
    - type: url
      target:  https://github.com/sairam3333/backstage-catalog-sample2/blob/main/catalog-info.yaml

# Permission left off in dev so local testing isn't blocked.
# If you need to test RBAC behavior locally, enable it and
# point at the same policies-csv-file used in production.
permission:
  enabled: false